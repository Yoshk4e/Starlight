name: Bug Report
description: Report a bug or unintended behavior
title: "bug: "
labels: ["type: bug"]

body:
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: Briefly describe the issue
          placeholder: Short description of the bug
      validations:
          required: true

    - type: textarea
      id: description
      attributes:
          label: Description
          description: Provide a detailed explanation of the issue
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          description: List steps to reproduce the issue
          placeholder: |
              1. Run ...
              2. Do ...
              3. Observe ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What should have happened?
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: What actually happened?
      validations:
          required: true

    - type: dropdown
      id: os
      attributes:
          label: Operating System
          options:
              - Linux
              - Windows
              - macOS
              - Other
      validations:
          required: true

    - type: input
      id: compiler
      attributes:
          label: Compiler
          placeholder: e.g. GCC 13, Clang 17, MSVC 19.x

    - type: input
      id: branch
      attributes:
          label: Branch / Commit
          placeholder: e.g. develop or commit hash

    - type: textarea
      id: logs
      attributes:
          label: Logs / Output
          description: Paste relevant logs or errors
          render: shell

    - type: textarea
      id: additional
      attributes:
          label: Additional Context
          description: Any extra information