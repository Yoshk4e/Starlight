syntax = "proto3";

// This file is shared between all Starlight projects.
package starlight;

option csharp_namespace = "Starlight.Rpc.Proto";

enum StarlightRetcode {
  STARLIGHT_RETCODE_SUCCESS = 0;
  STARLIGHT_RETCODE_SERVER_ERROR = -1;
  
  // Account error codes.
  STARLIGHT_RETCODE_ACCOUNT_NOT_FOUND = -10001;
  STARLIGHT_RETCODE_ACCOUNT_INVALID_TOKEN = -10002;
}