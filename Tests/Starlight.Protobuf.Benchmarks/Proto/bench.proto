// Google.Protobuf reference messages for the serialization benchmarks.
// Each message mirrors a Starlight.Game.Protocol message field-for-field and,
// critically, uses the SAME wire field numbers so the encoded payloads are
// byte-for-byte identical. That keeps the comparison honest: both engines do
// the same amount of varint/tag/length work, only the implementation differs.

syntax = "proto3";

option csharp_namespace = "Starlight.Protobuf.Benchmarks.Google";

// Mirrors Starlight.Game.Protocol.ScalarMatrix (v66 wire numbers 101..115).
message ScalarMatrix {
  int32 f_int32 = 101;
  int64 f_int64 = 102;
  uint32 f_uint32 = 103;
  uint64 f_uint64 = 104;
  sint32 f_sint32 = 105;
  sint64 f_sint64 = 106;
  fixed32 f_fixed32 = 107;
  fixed64 f_fixed64 = 108;
  sfixed32 f_sfixed32 = 109;
  sfixed64 f_sfixed64 = 110;
  bool f_bool = 111;
  float f_float = 112;
  double f_double = 113;
  string f_string = 114;
  bytes f_bytes = 115;
}

message CoverageSub {
  int32 value = 1;
}

// Mirrors Starlight.Game.Protocol.Coverage (v66 wire numbers 11..16).
message Coverage {
  optional int32 opt_int = 11;
  optional string opt_str = 12;
  int32 plain = 13;
  oneof choice {
    string choice_str = 14;
    int32 choice_int = 15;
    CoverageSub choice_msg = 16;
  }
}

// Mirrors the canonical (de-obfuscated) fields of
// Starlight.Game.Protocol.GetPlayerTokenReq with their v66 wire numbers, so a
// realistic string/varint-heavy login packet encodes to the same bytes.
message GetPlayerTokenReq {
  string psn_id = 9;
  string ticket = 156;
  string online_id = 8;
  string auth_appid = 410;
  string client_rand_key = 345;
  string birthday = 137;
  string account_uid = 15;
  string account_token = 14;
  uint32 authkey_ver = 868;
  uint32 platform_type = 13;
  uint32 sign_type = 1605;
  bool is_guest = 12;
  uint32 key_id = 45;
  uint32 uid = 4;
}
