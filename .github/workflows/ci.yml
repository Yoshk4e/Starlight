on: [push, pull_request]
name: Continuous Integration
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        timeout-minutes: 120
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore Starlight.slnx

            - name: Build
              run: dotnet build Starlight.slnx --configuration Release --no-restore

            - name: Test
              run: dotnet test Starlight.slnx --configuration Release --no-build --verbosity normal

    inspect-code:
        name: Code Quality
        runs-on: windows-latest
        timeout-minutes: 60
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Install ReSharper command line tools
              run: dotnet tool install -g JetBrains.ReSharper.GlobalTools --version "2025.3.*"

            - name: Add global tools to PATH
              run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

            - name: Clean up code with .editorconfig
              run: 'jb cleanupcode Starlight.slnx --profile="Built-in: Full Cleanup" --verbosity=WARN'

            - name: Verify code matches .editorconfig
              shell: pwsh
              run: |
                  if (git status --porcelain) {
                      Write-Host "::error::Code does not match .editorconfig. Run 'Code Cleanup' (Full Cleanup) in Rider and push the result."
                      git diff --stat
                      git diff
                      exit 1
                  }
                  Write-Host "Code matches .editorconfig."
