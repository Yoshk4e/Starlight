// Version (v99) dump of the synthetic coverage schema. Field numbers are
// deliberately shifted from the base structural ones to prove name-match
// correlation works through `optional` and `oneof`.

syntax = "proto3";

option csharp_namespace = "Starlight.Protobuf.Fixtures";

package v99;

import "extra.proto";

message CoverageSub {
  int32 value = 1;
}

message Coverage {
  optional int32 opt_int = 11;
  optional string opt_str = 12;
  int32 plain = 13;
  oneof choice {
    string choice_str = 14;
    int32 choice_int = 15;
    CoverageSub choice_msg = 16;
  }
}

// Version dump of the first-packet message. Field numbers are shifted from the
// base structural ones so the emitted wire tags prove version-number use:
//   seq        -> wire 4  (tag 0x20)
//   client_id  -> wire 5  (tag 0x2A)
//   tags       -> wire 6  (tag 0x32, packed)
//   flag       -> wire 7  (tag 0x38)
message PingReq {
  string client_id = 5;
  uint32 seq = 4;
  repeated uint32 tags = 6;
  bool flag = 7;
}

// Version dump of the remap probe; field numbers shifted so the default wire
// numbers differ from the base structural ones (remap tests rewrite these).
enum RemapEnum {
  REMAP_ZERO = 0;
  REMAP_ONE = 1;
  REMAP_TWO = 2;
}

message RemapSub {
  int32 n = 1;
}

message RemapProbe {
  int32 a = 21;
  string b = 22;
  optional int32 c = 23;
  repeated int32 d = 24;
  repeated string e = 25;
  map<int32, int32> f = 26;
  RemapSub g = 27;
  repeated RemapSub h = 28;
  map<int32, RemapSub> i = 29;
  RemapEnum en = 30;
  repeated RemapEnum ens = 31;
  oneof choice {
    int32 j = 32;
    RemapSub k = 33;
  }
}

// Version dump attaching the transform options. Covers: add+xor with fop="add"
// and fop="xor", an invertible mask, an add-only chain, and a negative add.
message Transformed {
  uint32 a = 1 [add = 100, xor = 12345, fop = "add"];
  uint64 b = 2 [xor = 999, add = 4242, fop = "xor"];
  int32 c = 3 [mask = "(value - 7) ^ 555"];
  uint32 d = 4 [add = 50000];
  int32 e = 5 [add = -123, xor = 9000, fop = "add"];
}

// Field numbers shifted (101..115) from the base structural ones; same order so
// the wire layout stays ascending for the byte-parity oracle.
message ScalarMatrix {
  int32 f_int32 = 101;
  int64 f_int64 = 102;
  uint32 f_uint32 = 103;
  uint64 f_uint64 = 104;
  sint32 f_sint32 = 105;
  sint64 f_sint64 = 106;
  fixed32 f_fixed32 = 107;
  fixed64 f_fixed64 = 108;
  sfixed32 f_sfixed32 = 109;
  sfixed64 f_sfixed64 = 110;
  bool f_bool = 111;
  float f_float = 112;
  double f_double = 113;
  string f_string = 114;
  bytes f_bytes = 115;
}
